name: Build Cross-Platform Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-musl:
    name: Linux MUSL (static)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build static Linux binary
        run: cargo build --release --target x86_64-unknown-linux-musl
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-analyzer-linux-musl-x86_64
          path: target/x86_64-unknown-linux-musl/release/json_analyzer

  windows-exe:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows executable
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-analyzer-windows-x86_64-msvc
          path: target/x86_64-pc-windows-msvc/release/json_analyzer.exe

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-musl, windows-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: json-analyzer-linux-musl-x86_64
          path: dist/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: json-analyzer-windows-x86_64-msvc
          path: dist/windows

      - name: Rename binaries
        run: |
          mv dist/linux/json_analyzer dist/json-analyzer-linux-x86_64
          mv dist/windows/json_analyzer.exe dist/json-analyzer-windows-x86_64.exe
          chmod +x dist/json-analyzer-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/json-analyzer-linux-x86_64
            dist/json-analyzer-windows-x86_64.exe
          generate_release_notes: true
