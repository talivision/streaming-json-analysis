name: Build Cross-Platform Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-musl:
    name: Linux MUSL (static)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build static Linux binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-analyzer-linux-musl-x86_64
          path: target/x86_64-unknown-linux-musl/release/json_analyzer

  windows-exe:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows executable
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-analyzer-windows-x86_64-msvc
          path: target/x86_64-pc-windows-msvc/release/json_analyzer.exe
